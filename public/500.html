<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>500 - サーバーエラー | SokoNote</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #FCFDF7;
        color: #333333;
        font-family: sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .error-number {
        font-size: 80px;
        font-weight: bold;
        color: #E65540;
        line-height: 1;
        margin-bottom: 16px;
      }

      .error-title {
        font-size: 20px;
        font-weight: bold;
        color: #333333;
        margin-bottom: 8px;
      }

      .error-message {
        font-size: 14px;
        color: #818181;
        margin-bottom: 32px;
        text-align: center;
      }

      .home-button {
        background-color: #6EA016;
        color: #FDFDFD;
        padding: 12px 32px;
        border-radius: 9999px;
        text-decoration: none;
        font-weight: bold;
        font-size: 16px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        transition: opacity 0.2s;
      }

      .home-button:hover {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <p class="error-number">500</p>
    <p class="error-title">サーバーエラーが発生しました</p>
    <p class="error-message">申し訳ありません。しばらく時間をおいてから<br>再度お試しください。</p>
    <a href="/" class="home-button">トップページに戻る</a>
  </body>
</html>
